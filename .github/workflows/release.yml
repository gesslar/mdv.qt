# CD for mdv: build the Windows installer and all four Linux artifacts
# (deb, rpm, AppImage, Flatpak), then tag + publish a GitHub Release —
# but only when CMakeLists.txt's VERSION has actually moved past the
# latest tag. Same version-controlled-releasing pattern used in the
# Maint repo, ported to a C++ project (version source is CMake, not
# package.json).
#
# Trigger:
#   - workflow_dispatch — manual gate. The version-bump check decides
#     whether a release actually happens; an un-bumped dispatch is a
#     no-op (annotated, exits green). The workflow CREATES the tag
#     itself, so there's no `push: tags:` trigger.
#
# Flow:
#   determine-version → windows + linux (parallel) → tag → release
#                       ↑ both gated on a real bump; an un-bumped run
#                         skips everything after determine-version.
#
# Build steps still lean on the same `make` targets that work locally
# (DEVELOPMENT.md), so this workflow can't drift from the documented
# build:
#   Windows: `make windows`   → dist/mdv-<version>-win64.exe   (NSIS)
#   Linux:   `make linux`     → dist/*.deb .rpm .AppImage .flatpak
#                               (built inside the pinned Fedora image at
#                                docker/Dockerfile, via docker/dist.sh)

name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + diagnose only — skip the tag and release jobs even on a version bump. Use to validate the pipeline without committing to a release.'
        type: boolean
        default: false

# Default permissions for build jobs; tag + release jobs opt up to write.
permissions:
  contents: read

jobs:
  # Read the version out of CMakeLists.txt, compare against existing
  # `v*.*.*` tags, and decide whether there's anything to release.
  # Outputs the bare version (e.g. "2.0.1") on a bump, or the 🙅🏻‍♂️
  # sentinel when the version already has a tag — matches the pattern
  # used in the Maint reusable workflows.
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # new-version-questionmark needs full tag history

      # The new-version-questionmark action reads .json/.yaml natively
      # but treats other files as a plain trimmed version string —
      # extract VERSION from CMakeLists.txt into a tiny file and point
      # the action at that. The same sed pattern lives in
      # Makefile.dist.linux (MDV_VERSION), so the truth source stays
      # project(VERSION ...).
      - name: Extract version from CMakeLists.txt
        run: |
          sed -nE 's/^[[:space:]]*VERSION[[:space:]]+([0-9.]+).*/\1/p' CMakeLists.txt \
            | head -1 > .version
          echo "CMakeLists version: $(cat .version)"

      - name: Check version against existing tags
        id: check
        uses: gesslar/new-version-questionmark@v1.6.2
        with:
          source: .version
          version_pattern: "^v\\d+\\.\\d+\\.\\d+$"

      - name: Set version output
        id: set
        run: |
          UPDATED="${{ steps.check.outputs.updated_version }}"
          if [[ "$UPDATED" == "no changes" ]]; then
            echo "::notice title=No version bump::CMakeLists.txt VERSION matches the latest tag; nothing to release."
            echo "VERSION=🙅🏻‍♂️" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Version bump::Will release v${UPDATED}."
            echo "VERSION=${UPDATED}" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: Windows installer
    needs: determine-version
    if: ${{ needs.determine-version.outputs.version != '🙅🏻‍♂️' }}
    runs-on: windows-latest
    defaults:
      run:
        # The Makefile is GNU-make + sh; use bash so it Just Works on Windows.
        # Git for Windows (pre-installed on the runner) provides bash, sed, and
        # the Perl that KSyntaxHighlighting needs at configure time.
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # Qt 6 + a matching MinGW (the toolchain DEVELOPMENT.md targets first).
      # `cache: true` keeps the ~2 GB Qt download out of the critical path on
      # subsequent runs.
      # Qt 6.9.0 is the minimum KSyntaxHighlighting v6.26 (what CMakeLists
      # fetches in-tree on Windows) accepts — see _deps/ksyntaxhighlighting-src
      # CMakeLists.txt :42, which calls find_package(Qt6 6.9.0 ...).
      - name: Install Qt 6 + MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310'
          cache: true

      # install-qt-action adds Qt's bin to PATH, but not the bundled MinGW's;
      # CMake needs g++ on PATH for the Ninja generator.
      - name: Add MinGW to PATH
        run: echo "$IQTA_TOOLS/mingw1310_64/bin" >> "$GITHUB_PATH"

      # NSIS for the installer; GNU make for the Makefile wrapper. Chocolatey
      # is preinstalled on windows-latest.
      - name: Install NSIS + make
        run: choco install -y --no-progress nsis make

      - name: Build NSIS installer
        run: make windows

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

  linux:
    name: Linux packages
    needs: determine-version
    if: ${{ needs.determine-version.outputs.version != '🙅🏻‍♂️' }}
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so CMake's AppStream metainfo step can derive the
      # release date from `git log` (CMakeLists.txt notes this falls back to
      # the build date if git history is absent).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The first `make linux` pulls org.kde.Platform/Sdk 6.9 (~1.5 GB).
      # docker/dist.sh stores this under ~/.cache/mdv-flatpak; persist it across
      # runs so only the very first build pays for the download.
      - name: Cache Flatpak KDE runtime
        uses: actions/cache@v5
        with:
          path: ~/.cache/mdv-flatpak
          key: mdv-flatpak-kde-6.9-${{ runner.os }}

      # Builds inside the pinned Fedora container (docker/Dockerfile), so the
      # runner only needs Docker — which ubuntu-latest already has.
      - name: Build deb / rpm / AppImage / Flatpak
        run: make linux

      # DIAGNOSTIC (temporary): reproduce the appstreamcli compose call that
      # fails inside flatpak-builder, but with --verbose, --media-baseurl
      # (which re-enables screenshot fetching — the previous run showed
      # appstreamcli was disabling that without it), and a proper /app symlink
      # so the unit lookup resolves to the staged tree instead of hitting
      # unit-read-error. Prefixed with a curl probe from inside the same
      # container, which is the cheapest way to confirm or rule out the
      # "screenshot URLs are unreachable from inside the runner's container"
      # hypothesis. No continue-on-error: a failure here fails the job, which
      # is what we want while iterating on the cause.
      - name: Diagnose appstreamcli compose
        if: always()
        run: |
          # Mirror docker/dist.sh's invocation exactly so the diagnostic runs
          # in the same docker environment flatpak-builder's compose runs in
          # (privileged + /dev/fuse + seccomp=unconfined + matching uid +
          # HOME/XDG_RUNTIME_DIR + /etc/passwd mount). Without this our
          # diagnostic was running in an unprivileged container, so bwrap
          # failed and glycin fell back to no-sandbox — a code path
          # flatpak-builder's call presumably never exercises.
          docker run --rm --platform=linux/amd64 \
            --user "$(id -u):$(id -g)" --security-opt label=disable \
            --privileged --device /dev/fuse --security-opt seccomp=unconfined \
            -v "$PWD":/work -w /work \
            -v /etc/passwd:/etc/passwd:ro \
            -e HOME=/tmp/fphome -e XDG_RUNTIME_DIR=/tmp/xdg \
            mdv-build \
            bash -euxc '
              mkdir -p /tmp/fphome /tmp/xdg && chmod 700 /tmp/xdg

              echo "=== appstreamcli version ==="
              appstreamcli --version

              echo "=== curl probe to the screenshot URLs (from inside the build container) ==="
              for url in \
                https://raw.githubusercontent.com/gesslar/mdv.qt/main/screenshots/syntax-highlighting.png \
                https://raw.githubusercontent.com/gesslar/mdv.qt/main/screenshots/elements.png \
                https://raw.githubusercontent.com/gesslar/mdv.qt/main/screenshots/preferences.png \
                https://raw.githubusercontent.com/gesslar/mdv.qt/main/screenshots/empty.png \
              ; do
                echo "--- $url ---"
                curl -fSsI -w "HTTP=%{http_code} time=%{time_total}s size_download=%{size_download}\n" -o /dev/null "$url" \
                  || echo "CURL FAILED with exit $?"
              done

              echo "=== appstreamcli compose --help (for flag reference) ==="
              appstreamcli compose --help || true

              echo "=== metainfo as installed into the flatpak tree ==="
              cat dist/flatpak-build/files/share/metainfo/dev.gesslar.mdv.metainfo.xml

              echo "=== staged tree contents (share/) ==="
              find dist/flatpak-build/files/share -maxdepth 4 -type f | sort

              echo "=== reproducing the failing compose with --verbose ==="
              # Build a fake root where /app -> staged tree, so appstreamcli`s
              # unit lookup (<root>/<prefix>/share) resolves to the actual
              # metainfo at dist/flatpak-build/files/share/.
              mkdir -p /tmp/diag-root
              ln -sfn /work/dist/flatpak-build/files /tmp/diag-root/app
              mkdir -p /tmp/compose-result /tmp/compose-data /tmp/compose-media /tmp/compose-icons

              # Critical: --media-dir is what actually enables screenshot
              # *storage*, which in turn enables the URL fetch we suspect is
              # failing in flatpak-builder`s call. The previous run confirmed
              # via debug log ("No media export directory set, but screenshots
              # are supposed to be stored. Disabling screenshot storage.") that
              # without it appstreamcli short-circuits screenshot handling and
              # the URL-fetch failure mode can never surface.
              appstreamcli compose --verbose \
                --prefix=/app \
                --result-root=/tmp/compose-result \
                --data-dir=/tmp/compose-data \
                --media-dir=/tmp/compose-media \
                --icons-dir=/tmp/compose-icons \
                --media-baseurl=https://example.com/media \
                --components=dev.gesslar.mdv,dev.gesslar.mdv.desktop \
                /tmp/diag-root
            '

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.flatpak
          if-no-files-found: error

  # Tag AFTER the builds pass: a failing build mustn't leave behind an
  # orphan tag pointing at code that never shipped. Idempotent — if the
  # tag already exists (manual race, re-run), we no-op and skip the
  # release job rather than blowing up.
  tag:
    name: Create tag
    needs: [determine-version, windows, linux]
    if: ${{ needs.determine-version.outputs.version != '🙅🏻‍♂️' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      # Pin to the commit the workflow was dispatched against so a push
      # to main mid-run can't move the tag onto a newer (un-built) commit.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create and push tag
        id: tag
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          TAG="v${VERSION}"

          if git tag -l "$TAG" | grep -q "^${TAG}$"; then
            echo "::warning title=Tag exists::Tag ${TAG} already exists; skipping tag + release."
            echo "new_tag=🙅🏻‍♂️" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "new_tag=$TAG" >> "$GITHUB_OUTPUT"

  release:
    name: GitHub Release
    needs: [tag]
    if: ${{ needs.tag.outputs.new_tag != '🙅🏻‍♂️' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NEW_TAG: ${{ needs.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(artifacts/*)
          shopt -u nullglob

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "::error title=No artifacts::Builds reported success but nothing landed in artifacts/."
            exit 1
          fi

          for f in "${FILES[@]}"; do
            echo "Attaching: $f"
          done

          gh release create "$NEW_TAG" \
            --title "Release $NEW_TAG" \
            --generate-notes \
            "${FILES[@]}"
